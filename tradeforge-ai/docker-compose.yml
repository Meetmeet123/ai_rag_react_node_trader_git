version: "3.8"

services:
  # Backend API + WebSocket Server
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tradeforge-backend
    ports:
      - "8000:8000"
      - "8765:8765"
    environment:
      - MONGODB_URI=mongodb://mongo:27017/tradeforge
      - MONGODB_DB_NAME=tradeforge
      - TRAINING_INTERVAL_MINUTES=20
      - DEBUG=false
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./strategies:/app/strategies
      - ./training/checkpoints:/app/training/checkpoints
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Frontend (React SPA)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tradeforge-frontend
    ports:
      - "3000:80"
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_WS_URL=ws://localhost:8000/ws
    depends_on:
      - backend
    restart: unless-stopped

  # MongoDB (primary database)
  mongo:
    image: mongo:7-jammy
    container_name: tradeforge-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Redis (for caching + pub/sub)
  redis:
    image: redis:7-alpine
    container_name: tradeforge-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongo_data:
  redis_data:
